<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números aleatória</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main>
        <img id="img-main" width="400" src="./assets/sort 1.png">
        <section>
            <p>Sortear um número</p>
            <div id="inputs">
                <input id="input-left" type="number" placeholder="Escolha o valor minimo.">
                <p id="resultado"></p>
                <input id="input-right" type="number" placeholder="Escolha o valor máximo.">
                <p id="resultado-2"></p>
            </div>
            <button id="button-sortear" type="submit">Sortear number</button>
        </section>
    </main>
</body>
<script src="./scripts.js"></script>
</html>
